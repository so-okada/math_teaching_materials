<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Ellipse Billiard</title>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            font-family: sans-serif;
        }
        canvas {
            display: block;
            touch-action: none;
        }
        .info {
            position: absolute;
            top: 24px;
            left: 24px;
            z-index: 10;
            pointer-events: none;
        }
        .info h1 {
            font-size: 1.5rem;
            font-weight: bold;
            margin: 0 0 8px 0;
        }
        .info p {
            margin: 4px 0;
            color: #94a3b8;
        }
        .info .hint {
            color: #60a5fa;
            font-size: 0.875rem;
        }
        .controls {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 16px;
        }
        .controls label {
            color: #cbd5e1;
            font-size: 0.875rem;
        }
        .controls input[type="range"] {
            width: 200px;
            accent-color: #60a5fa;
            cursor: pointer;
        }
        .controls .value {
            color: #e2e8f0;
            font-size: 0.875rem;
            min-width: 40px;
        }
    </style>
</head>
<body>

    <div class="info">
        <h1>Focus-to-Focus Demo</h1>
        <p>Move your mouse to aim the ball from the left focus.</p>
        <p class="hint">Every bounce will pass through the opposite focus.</p>
        <p style="color:#64748b; font-size:0.8rem;">Note: numerical computation; errors may accumulate.</p>
    </div>

    <div class="controls">
        <label for="focalSlider">Focal distance:</label>
        <input type="range" id="focalSlider" min="0" max="650" value="260" step="1">
    </div>

    <canvas id="billiardCanvas"></canvas>

    <script>
        const canvas = document.getElementById('billiardCanvas');
        const ctx = canvas.getContext('2d');
        const focalSlider = document.getElementById('focalSlider');

        let width, height, centerX, centerY;
        let a = 350; // Semi-major axis
        let c = 130; // Half focal distance
        let b = Math.sqrt(a * a - c * c); // Semi-minor axis

        let mouse = { x: 0, y: 0 };
        let ball = {
            x: -c,
            y: 0,
            dx: 0,
            dy: 0,
            speed: 5,
            radius: 8,
            active: false
        };

        function updateFocalDistance(twoC) {
            c = twoC / 2;
            b = Math.sqrt(a * a - c * c);
            // Reset ball to new focus position
            ball.active = false;
            ball.x = -c;
            ball.y = 0;
        }

        focalSlider.addEventListener('input', function() {
            updateFocalDistance(parseInt(this.value));
        });

        // Initialize from slider
        updateFocalDistance(parseInt(focalSlider.value));

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            centerX = width / 2;
            centerY = height / 2;
        }

        function ellipseVal(x, y) {
            return (x * x) / (a * a) + (y * y) / (b * b);
        }

        // Advance the ball by one frame's worth of displacement, resolving
        // any boundary collisions exactly (solve for the intersection of the
        // trajectory with the ellipse, reflect there, carry the remainder).
        function stepBall() {
            let remaining = 1.0; // fraction of this frame's displacement left
            let guard = 0;
            while (remaining > 1e-9 && guard < 10) {
                guard++;
                const x0 = ball.x, y0 = ball.y;
                const mvx = ball.dx * remaining;
                const mvy = ball.dy * remaining;
                const x1 = x0 + mvx, y1 = y0 + mvy;

                // If the full move stays inside, take it and stop.
                if (ellipseVal(x1, y1) < 1) {
                    ball.x = x1;
                    ball.y = y1;
                    break;
                }

                // Solve A t^2 + B t + C = 0 for the crossing fraction t in (0,1].
                const A = (mvx * mvx) / (a * a) + (mvy * mvy) / (b * b);
                const B = 2 * ((x0 * mvx) / (a * a) + (y0 * mvy) / (b * b));
                const C = ellipseVal(x0, y0) - 1;
                const disc = B * B - 4 * A * C;
                if (A === 0 || disc < 0) {
                    ball.x = x1;
                    ball.y = y1;
                    break;
                }
                const sq = Math.sqrt(disc);
                let t = (-B - sq) / (2 * A);
                if (t < 0 || t > 1) t = (-B + sq) / (2 * A);
                t = Math.max(0, Math.min(1, t));

                // Exact hit point.
                const hx = x0 + mvx * t;
                const hy = y0 + mvy * t;
                ball.x = hx;
                ball.y = hy;

                // Reflect velocity about the unit outward normal (x/a^2, y/b^2).
                let nx = hx / (a * a), ny = hy / (b * b);
                const nl = Math.hypot(nx, ny);
                nx /= nl;
                ny /= nl;
                const dot = ball.dx * nx + ball.dy * ny;
                ball.dx -= 2 * dot * nx;
                ball.dy -= 2 * dot * ny;

                // Continue with the leftover portion of the frame.
                remaining *= (1 - t);
            }
        }

        function update() {
            if (!ball.active) {
                const targetX = mouse.x - centerX;
                const targetY = mouse.y - centerY;
                const angle = Math.atan2(targetY - 0, targetX - (-c));
                ball.dx = Math.cos(angle) * ball.speed;
                ball.dy = Math.sin(angle) * ball.speed;
            } else {
                stepBall();
            }
        }

        function draw() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, width, height);

            ctx.save();
            ctx.translate(centerX, centerY);

            // Ellipse
            ctx.beginPath();
            ctx.ellipse(0, 0, a, b, 0, 0, Math.PI * 2);
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 6;
            ctx.stroke();
            ctx.strokeStyle = '#94a3b8';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Foci
            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(-c, 0, 8, 0, Math.PI * 2);
            ctx.arc(c, 0, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.font = '12px sans-serif';
            ctx.fillStyle = '#94a3b8';
            ctx.fillText('F1', -c - 8, 20);
            ctx.fillText('F2', c - 8, 20);

            // Aim line
            if (!ball.active) {
                ctx.setLineDash([5, 5]);
                ctx.beginPath();
                ctx.moveTo(-c, 0);
                ctx.lineTo(mouse.x - centerX, mouse.y - centerY);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Ball
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#60a5fa';
            ctx.fillStyle = '#60a5fa';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            update();
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', resize);

        canvas.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        canvas.addEventListener('mousedown', () => {
            if (!ball.active) {
                ball.active = true;
            } else {
                ball.active = false;
                ball.x = -c;
                ball.y = 0;
            }
        });

        canvas.addEventListener('touchstart', e => {
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
            if (!ball.active) ball.active = true;
            else {
                ball.active = false;
                ball.x = -c;
                ball.y = 0;
            }
        });

        resize();
        requestAnimationFrame(draw);
    </script>
</body>
</html>
